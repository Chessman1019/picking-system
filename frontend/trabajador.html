<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickFlow — Mi Turno</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="worker-page">
        <div class="page-wrapper">

            <!-- Top bar -->
            <div class="topbar">
                <div class="topbar-left">
                    <div class="avatar" id="avatarLetras">--</div>
                    <span class="topbar-name" id="nombreTrabajador"></span>
                    <span class="topbar-dni" id="dniTrabajador"></span>
                </div>
                <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
            </div>

            <!-- Main card -->
            <div class="worker-card">

                <!-- Clock -->
                <div class="clock-section">
                    <div class="clock-label">Hora actual</div>
                    <div class="clock-digits">
                        <div class="digit-block">
                            <div id="horaH" class="digit-num">--</div>
                        </div>
                        <div class="clock-sep">:</div>
                        <div class="digit-block">
                            <div id="horaM" class="digit-num">--</div>
                        </div>
                        <div class="clock-sep">:</div>
                        <div class="digit-block">
                            <div id="horaS" class="digit-num">--</div>
                        </div>
                        <div class="ampm-block">
                            <span id="ampm" class="ampm-tag">--</span>
                        </div>
                    </div>
                    <div id="fechaActual" class="clock-date"></div>
                </div>

                <!-- Status -->
                <div class="status-section">
                    <div id="statusPill" class="status-pill status-idle">
                        <span id="statusDot" class="status-dot"></span>
                        <span id="statusLabel">Sin picking activo</span>
                    </div>
                    <div id="estadoTexto" class="status-h3">No hay sesión iniciada</div>
                    <div id="tiempoTranscurrido" class="status-sub"></div>
                </div>

                <!-- Action buttons -->
                <div class="actions-section">
                    <button id="btnIniciar" onclick="iniciarPicking()" class="btn-start">
                        ▶&nbsp; Iniciar picking
                    </button>
                    <button id="btnFinalizar" onclick="finalizarPicking()" class="btn-stop" style="display:none;">
                        ■&nbsp; Finalizar picking
                    </button>
                </div>

                <!-- Summary -->
                <div class="summary-section">
                    <div class="summary-item">
                        <span class="summary-label">Total hoy</span>
                        <div id="totalHoy" class="summary-val">0h <small>0min</small></div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Último inicio</span>
                        <div id="ultimoRegistro" class="summary-val">—</div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Sesiones</span>
                        <div id="totalSesiones" class="summary-val">0</div>
                    </div>
                </div>

                <!-- Historial -->
                <div class="historial-section">
                    <div class="historial-header">
                        <span class="historial-title">Historial del día</span>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Inicio</th>
                                    <th>Fin</th>
                                    <th>Duración</th>
                                </tr>
                            </thead>
                            <tbody id="historialBody">
                                <tr>
                                    <td colspan="4" class="text-center td-muted">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/trabajador.js"></script>
</body>
</html>
