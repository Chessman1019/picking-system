<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickFlow — Mi Turno</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="worker-page">
        <div class="page-wrapper">

            <!-- Top bar -->
            <div class="topbar">
                <div class="topbar-left">
                    <div class="avatar" id="avatarLetras">--</div>
                    <span class="topbar-name" id="nombreTrabajador"></span>
                    <span class="topbar-dni" id="dniTrabajador"></span>
                </div>
                <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
            </div>

            <!-- Main card -->
            <div class="worker-card">

                <div class="clock-time">
                    <span id="horaH">--</span><span class="clock-colon">:</span>
                    <span id="horaM">--</span><span class="clock-colon">:</span>
                    <span id="horaS">--</span>
                    <span id="ampm" style="font-size: 22px; margin-left: 8px;"></span>
                </div>
                <!-- Status -->
                <div class="status-section">
                    <div id="statusPill" class="status-pill status-idle">
                        <span id="statusDot" class="status-dot"></span>
                        <span id="statusLabel">Sin picking activo</span>
                    </div>
                    <div id="estadoTexto" class="status-h3">No hay sesión iniciada</div>
                    <div id="tiempoTranscurrido" class="status-sub"></div>
                </div>

                <!-- Action buttons -->
                <div class="actions-section">
                    <button id="btnIniciar" onclick="iniciarPicking()" class="btn-start">
                        Iniciar picking
                    </button>
                    <button id="btnFinalizar" onclick="finalizarPicking()" class="btn-stop" style="display:none;">
                        Finalizar picking
                    </button>
                </div>

                <!-- Daily summary -->
                <div class="summary-section">
                    <div class="summary-item">
                        <span class="summary-label">Total hoy</span>
                        <div id="totalHoy" class="summary-val">0h <small>0min</small></div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Último inicio</span>
                        <div id="ultimoRegistro" class="summary-val">—</div>
                    </div>
                </div>


                <div class="historial-section">
                    <div class="historial-header">
                        <h3>📋 Historial de jornadas</h3>
                        <span class="historial-sub">días anteriores</span>
                    </div>
                    <div class="table-wrapper">
                        <table class="historial-table">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Inicio</th>
                                    <th>Fin</th>
                                    <th>Duración</th>
                                </tr>
                            </thead>
                            <tbody id="historialBody">
                                <tr>
                                    <td colspan="4">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/trabajador.js"></script>
</body>

</html>
